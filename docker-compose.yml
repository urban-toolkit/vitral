services:
  vitral:
    build:
      context: ./vitral
      dockerfile: ./Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
    ports:
      #- 127.0.0.1:9898:5173
      - 127.0.0.1:9898:80
    depends_on:
      - backend
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgres://vitral:vitral@postgres:5432/vitral
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:9898/api/auth/github/callback}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:9898}
      DOCLING_URL: ${DOCLING_URL}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
    expose:
      - "${PORT:-3000}"
    depends_on:
      - postgres
      - minio
      - minio-init
      - docling-serve
    restart: unless-stopped
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: vitral
      POSTGRES_PASSWORD: vitral
      POSTGRES_DB: vitral
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
  migrate:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      DATABASE_URL: postgres://vitral:vitral@postgres:5432/vitral
    depends_on:
      - postgres
    command: sh -lc "node /app/dist/db/migrate.js || node /app/dist/src/db/migrate.js"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vitralminio
      MINIO_ROOT_PASSWORD: vitralminio
    expose:
      - "9000" # S3 API
      - "9001" # Web console
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vitralminio vitralminio &&
      mc mb -p local/vitral-files || true &&
      mc anonymous set none local/vitral-files || true
      "
  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    expose:
      - "5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: true
      DOCLING_SERVE_NUM_WORKERS: 4
      OMP_NUM_THREADS: 4
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

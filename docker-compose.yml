services:
  vitral:
    build:
      context: ./vitral
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
    env_file:
      - ./vitral/.env.production
      - .env.common
    ports:
      - 127.0.0.1:9898:80
    depends_on:
      - backend
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      NODE_OPTIONS: --max-old-space-size=2048
    env_file:
      - ./backend/.env.production
      - .env.common
      - .env
    expose:
      - "3000"
    depends_on:
      - postgres
      - minio
      - minio-init
      - docling-serve
    restart: unless-stopped
  postgres:
    image: pgvector/pgvector:pg18
    env_file:
      - .env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
  migrate:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    command: sh -lc "node /app/dist/db/migrate.js || node /app/dist/src/db/migrate.js"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    expose:
      - "9000" # S3 API
      - "9001" # Web console
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
      mc mb -p local/vitral-files || true &&
      mc anonymous set none local/vitral-files || true
      "
  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    expose:
      - "5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: true
      DOCLING_SERVE_NUM_WORKERS: 4
      OMP_NUM_THREADS: 4
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

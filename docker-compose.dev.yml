services:
  vitral:
    build:
      context: ./vitral
      dockerfile: ./Dockerfile.dev
    environment:
      NODE_ENV: development
      VITE_BACKEND_URL: http://localhost:3000
    ports:
      - 5173:5173
    develop:
      watch:
        - action: sync
          path: ./vitral/src
          target: /app/src
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./vitral/package.json
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgres://vitral:vitral@postgres:5432/vitral
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      COOKIE_SECRET: ${COOKIE_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - minio
      - minio-init
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./backend/package.json
  postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: vitral
      POSTGRES_PASSWORD: vitral
      POSTGRES_DB: vitral
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
  migrate:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    environment:
      DATABASE_URL: postgres://vitral:vitral@postgres:5432/vitral
    depends_on:
      - postgres
    command: npm run migrate
    restart: "no"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vitralminio
      MINIO_ROOT_PASSWORD: vitralminio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vitralminio vitralminio &&
      mc mb -p local/vitral-files || true &&
      mc anonymous set none local/vitral-files || true
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
services:
  vitral:
    build:
      context: ./vitral
      dockerfile: ./Dockerfile.dev
    environment:
      NODE_ENV: development
    env_file:
      - ./vitral/.env.development
      - .env.common
    ports:
      - 5173:5173
    develop:
      watch:
        - action: sync
          path: ./vitral/src
          target: /app/src
          #initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./vitral/package.json
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    environment:
      NODE_OPTIONS: --max-old-space-size=2048
    env_file:
      - ./backend/.env.development
      - .env.common
      - .env
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - minio
      - minio-init
      - docling-serve
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
          #initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./backend/package.json
  postgres:
    image: pgvector/pgvector:pg18
    env_file:
      - .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
  migrate:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    env_file:
      - .env
    depends_on:
      - postgres
    command: npm run migrate
    restart: "no"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
      mc mb -p local/vitral-files || true &&
      mc anonymous set none local/vitral-files || true
      "
    restart: "no"
  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    ports:
      - "5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: true
      DOCLING_SERVE_NUM_WORKERS: 4
      OMP_NUM_THREADS: 4
    restart: "no"

volumes:
  postgres_data:
  minio_data:

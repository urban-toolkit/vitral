services:
  vitral:
    build:
      context: ./vitral
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
    ports:
      - 5173:5173
    develop:
      watch:
        - action: sync
          path: ./vitral/src
          target: /app/src
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: ./vitral/package.json